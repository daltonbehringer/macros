services:
  postgres:
    image: postgres:16-alpine
    container_name: macros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: macros
      POSTGRES_PASSWORD: macros
      POSTGRES_DB: macros
    ports:
      - "5432:5432"
    volumes:
      - macros_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macros -d macros"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  macros_pg_data:
